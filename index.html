<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body id="bg">
  <main>
    
    <div class="timer-wrapper">
      <svg class="ring"viewBox="0 0 220 220">
        <circle
          class="ring-bg"
          cx="110"
          cy="110"
          r="100"
        />
        <circle
          id="progress"
          class="ring-progress"
          cx="110"
          cy="110"
          r="100"
        />
      </svg>

      <p id="timer">0:00:00</p>
    </div>
    <img src="setting-icon.svg" id="setting-icon" alt="歯車" width="48px" height="48px">

    <!-- 設定画面 -->
    <section class="hidden" id="setting">
      <p>いったん後で考える</p>
    </section>
  </main>
  <script src="main.js"></script>
</body>
</html>
